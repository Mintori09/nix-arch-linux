<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdview</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar" id="toolbar">
        <div class="toolbar__left">
          <button id="toggle-sidebar" type="button">Sidebar</button>
          <button id="toggle-outline" type="button">Outline</button>
          <button id="btn-preview" type="button" class="view-mode-btn">Preview</button>
          <button id="btn-edit" type="button" class="view-mode-btn">Edit</button>
          <button id="btn-wysiwyg" type="button" class="view-mode-btn">WYSIWYG</button>
          <span id="vim-mode-chip" class="vim-mode-chip hidden" aria-live="polite"></span>
        </div>
        <div class="toolbar__center">
          <strong id="doc-name">Untitled</strong>
          <span id="doc-meta"></span>
        </div>
        <div class="toolbar__right">
          <button id="open-search" type="button">Search</button>
          <button id="toggle-settings" type="button">Theme</button>
          <button id="print-page" type="button">Print</button>
          <span id="status-pill">Temporary</span>
        </div>
      </header>

      <div class="chrome">
        <aside class="sidebar hidden" id="file-sidebar">
          <div class="panel-title">Files</div>
          <div id="file-list" class="panel-scroll"></div>
        </aside>

        <main class="workspace" id="workspace">
          <section class="editor-pane hidden" id="editor-pane">
            <div id="editor" class="editor-area" spellcheck="false" contenteditable="true"></div>
          </section>
          <section class="preview-pane" id="preview-pane">
            <article class="preview prose" id="preview"></article>
          </section>
        </main>

        <aside class="sidebar hidden" id="outline-sidebar">
          <div class="panel-title">Outline</div>
          <div id="outline-list" class="panel-scroll"></div>
        </aside>
      </div>

      <section class="drawer hidden" id="settings-drawer">
        <h2>Reading Settings</h2>
        <label
          >Theme
          <select id="theme-select">
            <option value="warm">Warm Paper</option>
            <option value="minimal">Minimal Light</option>
            <option value="dark">Dark</option>
            <option value="paper">Sepia Reading</option>
          </select>
        </label>
        <label
          >Appearance
          <select id="appearance-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <label
          >Font family
          <select id="font-family-select">
            <option value="serif">Serif</option>
            <option value="sans-serif">Sans</option>
            <option value="monospace">Mono</option>
          </select>
        </label>
        <label
          >Content width
          <input id="width-input" type="range" min="560" max="980" step="10" />
        </label>
        <label
          >Font size
          <input id="font-size-input" type="range" min="14" max="24" step="1" />
        </label>
        <label
          >Body line height
          <input
            id="body-line-height-input"
            type="range"
            min="1.4"
            max="2.2"
            step="0.1"
          />
        </label>
        <label
          >Paragraph spacing
          <input
            id="paragraph-spacing-input"
            type="range"
            min="0.4"
            max="1.6"
            step="0.1"
          />
        </label>
        <label
          >Code font size
          <input
            id="code-font-size-input"
            type="range"
            min="12"
            max="18"
            step="1"
          />
        </label>
        <label
          >Code line height
          <input
            id="code-line-height-input"
            type="range"
            min="1.2"
            max="2.0"
            step="0.1"
          />
        </label>
        <label
          >Editor font
          <select id="editor-font-select">
            <option value="monospace">Mono</option>
            <option value="serif">Serif</option>
            <option value="sans-serif">Sans</option>
          </select>
        </label>
        <label
          >Editor font size
          <input
            id="editor-font-size-input"
            type="range"
            min="12"
            max="20"
            step="1"
          />
        </label>
        <label
          >Editor line height
          <input
            id="editor-line-height-input"
            type="range"
            min="1.2"
            max="2.0"
            step="0.1"
          />
        </label>
      </section>

      <section class="drawer hidden" id="search-drawer">
        <h2>Search</h2>
        <div class="search-controls">
          <input
            id="search-query"
            type="search"
            placeholder="Search in file or workspace"
          />
          <select id="search-scope">
            <option value="file">Current file</option>
            <option value="workspace">Workspace</option>
          </select>
        </div>
        <div id="search-results" class="search-results"></div>
      </section>
    </div>

    <script src="/mermaid.min.js"></script>
    <script type="module" src="/app.js" data-tiptap-imports></script>
  </body>
</html>
